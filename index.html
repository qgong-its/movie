<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Diary</title>
    <script type="module" src="./src/main.js" defer></script>
  </head>
  <body class="min-h-screen flex flex-col bg-slate-950 text-white">
    <header class="border-b border-slate-800">
      <nav
        class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4"
      >
        <h1 class="text-xl font-bold">Movie Diary (TMDB API)</h1>
        <div class="flex gap-4">
          <a href="./index.html" class="hover:text-yellow-400">Home</a>
          <a href="./journal.html" class="hover:text-yellow-400">Journal</a>
        </div>
      </nav>
    </header>

    <main class="mx-auto w-full max-w-6xl flex-1 px-6 py-10">
      <section
        class="mb-12 rounded-2xl bg-[#1E293B] p-8 shadow-md border border-[#334155]"
      >
        <div class="mx-auto max-w-xl text-center">
          <h2 class="text-3xl font-bold text-white">
            Discover <span class="text-[#FACC15]">Movies</span>
          </h2>
          <p class="mt-2 text-sm text-slate-400">
            Search and save your favorite movies
          </p>

          <form id="search-form" class="mt-6 flex gap-2">
            <input
              type="text"
              id="search-input"
              placeholder="Search movies..."
              class="flex-1 rounded-lg border border-[#334155] bg-[#0F172A] px-4 py-2 text-white outline-none focus:border-[#FACC15]"
            />
            <button
              type="submit"
              class="rounded-lg bg-[#FACC15] px-6 py-2 font-bold text-[#0F172A] hover:bg-yellow-500 transition-colors"
            >
              Search
            </button>
          </form>
        </div>
      </section>
      <section class="mx-auto max-w-7xl px-6 pb-16">
        <div class="flex items-center gap-2 mb-8">
          <span class="text-lg">🔥</span>
          <h2 class="text-2xl font-semibold text-white">Popular Movies</h2>
        </div>
        <div
          id="card-container"
          class="grid grid-cols-1 gap-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5"
        >
          <!-- movie cards will be populated here, example: -->
        </div>
      </section>
      <!-- page nav will be populated here, example:
      <nav class="main-nav">
        <ul id="pagination-container">
            <li>
              <button class="prev-btn">prev page</button>

              <button class="next-btn">next-page</button>
            </li>
        </ul>
      </nav>
      -->
    </main>

    <footer
      class="border-t border-slate-800 px-6 py-4 text-center text-sm text-slate-400"
    >
      Movie Diary Project
    </footer>
  </body>
</html>
