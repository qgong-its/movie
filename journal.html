<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Diary</title>
    <script type="module" src="./src/journal.js" defer></script>
  </head>
  <body class="min-h-screen flex flex-col bg-slate-950 text-white">
    <header class="border-b border-slate-800">
      <nav
        class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4"
      >
        <h1 class="text-xl font-bold">Movie Diary (TMDB API)</h1>
        <div class="flex gap-4">
          <a href="./index.html" class="hover:text-yellow-400">Home</a>
          <a href="./journal.html" class="hover:text-yellow-400">Journal</a>
        </div>
      </nav>
    </header>

    <main class="mx-auto w-full max-w-6xl flex-1 px-6 py-10">
      <section
        class="mb-10 rounded-2xl border border-[#334155] bg-[#1E293B] p-8 shadow-md"
      >
        <div class="mx-auto max-w-3xl text-center">
          <h2 class="text-3xl font-bold text-white">
            My <span class="text-[#FACC15]">Journal</span>
          </h2>
          <p class="mt-2 text-sm text-slate-400">
            Your saved favourite movies will appear here.
          </p>
        </div>
      </section>
      <section class="mx-auto max-w-7xl px-6 pb-16">
        <div class="mb-8 flex items-center gap-2">
          <span class="text-lg">📒</span>
          <h2 class="text-2xl font-semibold text-white">Favourite Movies</h2>
        </div>

        <div
          id="journal-container"
          class="grid grid-cols-1 gap-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5"
        ></div>
      </section>
    </main>

    <footer
      class="border-t border-slate-800 px-6 py-4 text-center text-sm text-slate-400"
    >
      Movie Diary Project
    </footer>

    <dialog
        id="note-dialog"
        class="m-auto w-[min(680px,92vw)] rounded-2xl border border-slate-700 bg-[#0F172A] p-0 text-white shadow-2xl"
      >
        <form method="dialog" class="flex flex-col gap-4 p-6">
          <h2 id="note-dialog-title" class="text-xl font-bold text-[#FACC15]">
            Add Note
          </h2>

          <label for="note-input" class="text-sm text-slate-300"
            >Your note</label
          >

          <textarea
            id="note-input"
            name="note"
            rows="8"
            placeholder="Write your note here..."
            class="w-full rounded-xl border border-slate-700 bg-slate-900 px-4 py-3 text-sm text-white outline-none focus:border-[#FACC15]"
          ></textarea>

          <div class="flex justify-end gap-3">
            <button
              type="button"
              id="note-cancel-btn"
              class="rounded-lg border border-slate-600 px-4 py-2 text-sm font-semibold text-slate-200 transition hover:bg-slate-800"
            >
              Cancel
            </button>
            <button
              type="button"
              id="note-save-btn"
              class="rounded-lg bg-[#FACC15] px-4 py-2 text-sm font-bold text-[#0F172A] transition hover:bg-yellow-500"
            >
              Save
            </button>
          </div>
        </form>
      </dialog>
  </body>
</html>
